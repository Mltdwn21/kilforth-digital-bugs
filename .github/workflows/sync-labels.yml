# Syncs repo labels with the source-of-truth file at .github/labels.yml.
# Runs on any push to main that touches the labels file (or this
# workflow), and on demand via the Actions tab's "Run workflow" button.
#
# delete-other-labels is false so labels added manually in the GitHub UI
# survive — flip to true once labels.yml is comprehensive enough to be
# the single source of truth.
name: Sync labels

on:
  push:
    branches: [main]
    paths:
      - '.github/labels.yml'
      - '.github/workflows/sync-labels.yml'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: EndBug/label-sync@v2
        with:
          config-file: .github/labels.yml
          delete-other-labels: false
